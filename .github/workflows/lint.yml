name: Lint

on:
  push:
    branches: 
    - main
    - 'feature/**'
    - 'feat/**'
  pull_request:
    branches: 
    - main
    - 'feature/**'
    - 'feat/**'

jobs:
  ruff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/ruff-action@v3
        with:
          args: check

      - uses: astral-sh/ruff-action@v3
        with:
          args: format --check
